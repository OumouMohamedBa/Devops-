---
- name: Pull postgres image
  docker_image:
    name: "rougha/postgres_grp2:{{ database_version }}"
    source: pull

- name: Backup old database image
  shell: |
    docker tag rougha/postgres_grp2:latest rougha/postgres_grp2:backup || true

- name: Stop database
  shell: |
    docker stop database || true
    docker stop postgres_db || true
    # Arrêter tout conteneur écoutant sur le port 5432
    CONTAINER_ID=$(docker ps -q --filter "publish=5432")
    if [ ! -z "$CONTAINER_ID" ]; then
      docker stop $CONTAINER_ID || true
    fi

- name: Remove database
  shell: |
    docker rm database || true
    docker rm postgres_db || true
    # Supprimer tout conteneur qui utilisait le port 5432
    CONTAINER_ID=$(docker ps -aq --filter "publish=5432")
    if [ ! -z "$CONTAINER_ID" ]; then
      docker rm $CONTAINER_ID || true
    fi

- name: Kill any process using port 5432
  shell: |
    # Arrêter le service PostgreSQL natif s'il existe
    systemctl stop postgresql || true
    # Tuer tout processus sur le port 5432
    fuser -k 5432/tcp || true
    lsof -ti:5432 | xargs kill -9 || true
  ignore_errors: yes

- name: Create Docker network
  shell: docker network create app-network || true

- name: Start database
  shell: |
    docker run -d \
    --name database \
    --network app-network \
    -e POSTGRES_PASSWORD=admin \
    -p 5432:5432 \
    rougha/postgres_grp2:{{ database_version }}

- name: Wait database
  pause:
    seconds: 15

- name: Verify database
  shell: docker ps | grep database
  register: db_check
  failed_when: db_check.rc != 0

- name: Rollback database
  shell: |
    docker stop database
    docker rm database
    docker run -d \
    --name database \
    -e POSTGRES_PASSWORD=admin \
    -p 5432:5432 \
    postgres:backup
  when: db_check.failed